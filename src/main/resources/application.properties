# ==========================================
# APPLICATION CONFIGURATION
# ==========================================
quarkus.application.name=student-management
quarkus.application.version=1.0.0

# ==========================================
# HTTP SERVER
# ==========================================
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with
quarkus.http.cors.methods=GET, POST, PUT, DELETE, PATCH, OPTIONS

# ==========================================
# DATABASE - MySQL
# ==========================================
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=root
quarkus.datasource.password=123456
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/student_management?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=10

# ==========================================
# HIBERNATE ORM
# ==========================================
# Options: none, create, drop-and-create, drop, update, validate
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.sql-load-script=import.sql

# ==========================================
# JWT CONFIGURATION
# ==========================================
# da comment =))
#mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
#mp.jwt.verify.issuer=student-management-api
#quarkus.smallrye-jwt.enabled=true
