# ==========================================
# APPLICATION CONFIGURATION
# ==========================================
quarkus.application.name=student-management
quarkus.application.version=1.0.0

# ==========================================
# HTTP SERVER
# ==========================================
quarkus.http.port=8080
# Enable built-in CORS so browser login and preflight requests work reliably.
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173,http://localhost:4173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,origin,x-requested-with
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-allow-credentials=true

# ==========================================
# DATABASE - MySQL
# ==========================================
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=root
quarkus.datasource.password=phuocnguyen
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/student_management?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=10

# ==========================================
# HIBERNATE ORM
# ==========================================
# Options: none, create, drop-and-create, drop, update, validate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.sql-load-script=import.sql

# Flyway migrations
quarkus.flyway.migrate-at-start=true
%dev.quarkus.flyway.clean-at-start=false

# ==========================================
# JWT CONFIGURATION
# ==========================================
mp.jwt.verify.publickey.location=publicKey.pem
smallrye.jwt.sign.key.location=privateKey.pem
quarkus.smallrye-jwt.enabled=true

# JWT expiry: 24 hours in seconds
app.jwt.expiry=86400
app.jwt.issuer=student-management-api

# mo tai day

# ==========================================
# OPENAPI / SWAGGER UI
# ==========================================
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=Student Management API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=RESTful API for Student Management System built with Quarkus
quarkus.smallrye-openapi.info-contact-name=Student Management Team
quarkus.smallrye-openapi.security-scheme=jwt
quarkus.smallrye-openapi.security-scheme-name=BearerAuth
quarkus.smallrye-openapi.jwt-security-scheme-value=bearer
quarkus.smallrye-openapi.security-scheme-description=JWT token in format: Bearer {token}

# ==========================================
# LOGGING
# ==========================================
quarkus.log.level=INFO
quarkus.log.category."com.studentmgmt".level=DEBUG

# ==========================================
# REDIS & RATE LIMITING
# ==========================================
quarkus.redis.hosts=redis://localhost:6379
rate-limit.requests-per-minute=100

# ==========================================
# DEV MODE
# ==========================================
%dev.quarkus.hibernate-orm.log.sql=false
%dev.quarkus.log.level=INFO

# ==========================================
# TEST
# ==========================================
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:test
%test.quarkus.hibernate-orm.database.generation=drop-and-create

mp.jwt.verify.issuer=student-management-api